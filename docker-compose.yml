services:
  wisedeck:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APT_DEBIAN_URL=${APT_DEBIAN_URL:-http://deb.debian.org/debian}
        - APT_SECURITY_URL=${APT_SECURITY_URL:-http://deb.debian.org/debian-security}
    image: bradleylzh/wisedeck:latest
    container_name: wisedeck
    # Chromium requires more shared memory than Docker's default 64MB
    shm_size: '4gb'

    ports:
      - "8000:8000"
    volumes:
      # Configuration
      - ./.env:/app/.env
      # Development: mount local src for debugging without rebuild
      # - ./src:/app/src
      # Data persistence
      - wisedeck_data:/app/data
      - wisedeck_uploads:/app/uploads
      - wisedeck_reports:/app/research_reports
      - wisedeck_cache:/app/temp
      # Persist Apryse SDK to avoid re-downloading on each restart
      - wisedeck_lib:/app/lib
    environment:
      - PYTHONPATH=/opt/venv/lib/python3.11/site-packages:/app/src
      - PYTHONUNBUFFERED=1
      # Uvicorn settings (read from .env via compose interpolation)
      - WORKERS=${WORKERS:-2}
      - RELOAD=${RELOAD:-false}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8000}
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Security - read from .env
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-me}
      # n8n / automation API auth
      - WISEDECK_API_KEY=${WISEDECK_API_KEY:-}
      - WISEDECK_API_KEY_USER=${WISEDECK_API_KEY_USER:-admin}
      - WISEDECK_API_KEYS=${WISEDECK_API_KEYS:-}
      - WISEDECK_BOOTSTRAP_ADMIN_ENABLED=${WISEDECK_BOOTSTRAP_ADMIN_ENABLED:-false}
      - WISEDECK_BOOTSTRAP_ADMIN_USERNAME=${WISEDECK_BOOTSTRAP_ADMIN_USERNAME:-}
      - WISEDECK_BOOTSTRAP_ADMIN_PASSWORD=${WISEDECK_BOOTSTRAP_ADMIN_PASSWORD:-}
      - WISEDECK_ENABLE_API_DOCS=${WISEDECK_ENABLE_API_DOCS:-true}
      - WISEDECK_ALLOW_HEADER_SESSION_AUTH=${WISEDECK_ALLOW_HEADER_SESSION_AUTH:-false}

      # PostgreSQL connection - read from .env
      - DATABASE_URL=postgresql://${POSTGRES_USER:-wisedeck}:${POSTGRES_PASSWORD:-wisedeck}@postgres:5432/${POSTGRES_DB:-wisedeck}
      # Valkey cache - read from .env
      - CACHE_BACKEND=valkey
      - VALKEY_URL=valkey://valkey:${VALKEY_PORT:-6379}

      # Optional: Presenton-derived render-service for structured PPTX (see render-service/README_WISEDECK.md)
      - WISEDECK_RENDER_SERVICE_URL=${WISEDECK_RENDER_SERVICE_URL:-}
      - WISEDECK_APP_DATA_DIRECTORY=${WISEDECK_APP_DATA_DIRECTORY:-/app/temp/wisedeck_app_data}

    depends_on:

      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/docker-healthcheck.sh"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 40s
    networks:
      - wisedeck_network

  postgres:
    image: postgres:16-alpine
    container_name: wisedeck-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-landppt}
      POSTGRES_USER: ${POSTGRES_USER:-landppt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-landppt}
    ports:
      - "6004:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wisedeck} -d ${POSTGRES_DB:-wisedeck}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wisedeck_network
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    container_name: wisedeck-valkey
    command: valkey-server --appendonly yes
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wisedeck_network
    restart: unless-stopped

volumes:
  wisedeck_data:
    driver: local
  wisedeck_uploads:
    driver: local
  wisedeck_reports:
    driver: local
  wisedeck_cache:
    driver: local
  wisedeck_lib:
    driver: local
  postgres_data:
    driver: local
  valkey_data:
    driver: local

networks:
  wisedeck_network:
    driver: bridge
